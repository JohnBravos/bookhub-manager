# BookHub Manager - Development Configuration
# This file is used for local development with: mvn spring-boot:run

# ==================== DATABASE ====================
spring.datasource.url=jdbc:mysql://localhost:3306/bookhub
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA/HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ==================== SERVER ====================
server.port=8080
server.servlet.context-path=/api
server.compression.enabled=false

# ==================== JWT ====================
jwt.secret=dev-secret-key-change-in-production-min-32-characters-long
jwt.expiration=86400000

# ==================== CORS ====================
cors.allowed-origins=http://localhost:3000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600
cors.allow-credentials=true

# ==================== LOGGING ====================
logging.level.root=INFO
logging.level.com.JohnBravos.bookhub_manager=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ==================== ACTUATOR ====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==================== APPLICATION INFO ====================
spring.application.name=BookHub Manager
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# ==================== DEVELOPMENT FEATURES ====================
spring.devtools.restart.enabled=true
spring.h2.console.enabled=false
